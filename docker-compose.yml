version: '3.8'

services:
  # خدمة قاعدة البيانات
  postgres:
    image: postgres:15-alpine
    container_name: iot_db_prod
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mysecurepassword
      POSTGRES_DB: iot_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # خدمة الباكند
  backend:
    build: ./iot-backend
    container_name: iot_backend_prod
    restart: always
    ports:
      - "3005:3000" # API Port
      - "8899:8899" # TCP Port for Sensors
    environment:
      DATABASE_URL: "postgresql://myuser:mysecurepassword@postgres:5432/iot_db?schema=public"
      PORT: 3000
      TCP_PORT: 8899
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: diboo22 
      JWT_SECRET: super_long_random_secret_key_change_this
    depends_on:
      - postgres

volumes:
  postgres_data: