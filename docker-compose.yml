version: '3.8'

services:
  # 1. خدمة قاعدة البيانات (PostgreSQL)
  iot_db:
    image: postgres:15-alpine
    container_name: iot_db_prod
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mysecurepassword
      POSTGRES_DB: iot_db
    ports:
      - "5435:5432" # بورت 5435 عشان ميتعارضش مع الموقع القديم
    volumes:
      - iot_pg_data:/var/lib/postgresql/data
    networks:
      - iot_net

  # 2. خدمة الباك إند (Backend)
  iot_backend:
    build: ./iot-backend
    container_name: iot_backend_prod
    restart: always
    ports:
      - "3005:3000" # API Port
      - "8899:8899" # TCP Port
    environment:
      DATABASE_URL: "postgresql://myuser:mysecurepassword@iot_db:5432/iot_db?schema=public"
      PORT: 3000
      TCP_PORT: 8899
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: diboo22
      JWT_SECRET: super_long_random_secret_key_change_this
    depends_on:
      - iot_db
    networks:
      - iot_net

  # 3. خدمة الفرونت إند (Dashboard) - دي اللي كانت ناقصة!
  iot_frontend:
    build:
      context: ./iot-dashboard
      args:
        VITE_API_URL: ${VITE_API_URL:-http://76.13.33.253:3005}
    container_name: iot_dashboard_prod
    restart: always
    ports:
      - "8090:80" # هيشتغل على بورت 8090
    depends_on:
      - iot_backend
    networks:
      - iot_net

volumes:
  iot_pg_data:

networks:
  iot_net:
    driver: bridge